<style>
  :root {
    --ink: #1a1a2e;
    --ink2: #2d2d4e;
    --cream: #f5f0e8;
    --accent: #c8483a;
    --green: #2d7a4f;
    --gold: #b8860b;
    --border: #ddd8ce;
    --shadow: 0 2px 12px rgba(26,26,46,0.08);
    --shadow-lg: 0 8px 32px rgba(26,26,46,0.14);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--ink); min-height:100vh; }

  /* LOGIN */
  #login-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:var(--ink); padding:1rem; position:fixed; inset:0; z-index:1000;
  }
  .login-card {
    background:white; border-radius:20px; padding:2.5rem;
    width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,0.4);
  }
  .login-logo { text-align:center; margin-bottom:2rem; }
  .login-logo-dot { width:10px; height:10px; background:var(--accent); border-radius:50%; display:inline-block; margin-right:6px; }
  .login-logo-title { font-family:'DM Serif Display',serif; font-size:1.6rem; color:var(--ink); }
  .login-logo-sub { font-size:0.82rem; color:#999; margin-top:6px; }
  .login-tabs { display:flex; background:var(--cream); border-radius:10px; padding:4px; margin-bottom:1.5rem; }
  .login-tab { flex:1; padding:0.5rem; border:none; background:none; border-radius:8px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:500; color:#888; transition:all 0.2s; }
  .login-tab.active { background:white; color:var(--ink); box-shadow:0 1px 4px rgba(0,0,0,0.1); }
  .login-form { display:flex; flex-direction:column; gap:1rem; }
  .login-form input { padding:0.75rem 1rem; border:1.5px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.95rem; color:var(--ink); transition:border-color 0.2s; width:100%; }
  .login-form input:focus { outline:none; border-color:var(--accent); }
  .login-btn { padding:0.8rem; background:var(--accent); color:white; border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:600; cursor:pointer; margin-top:0.5rem; width:100%; }
  .login-btn:hover { background:#a83828; }
  .login-msg { text-align:center; font-size:0.82rem; padding:0.75rem; border-radius:8px; margin-top:0.5rem; }
  .login-msg.error { background:#f8d7da; color:#721c24; }
  .login-msg.success { background:#d4edda; color:#155724; }
  .login-msg.warn { background:#fff3cd; color:#856404; }

  /* HEADER */
  header {
    background:var(--ink); color:white;
    padding:0 1.5rem; display:flex; align-items:center;
    justify-content:space-between; height:60px;
    position:sticky; top:0; z-index:100;
    box-shadow:0 2px 16px rgba(0,0,0,0.25);
  }
  .logo { font-family:'DM Serif Display',serif; font-size:1.2rem; display:flex; align-items:center; gap:8px; }
  .logo-dot { width:7px; height:7px; background:var(--accent); border-radius:50%; }
  .header-right { display:flex; align-items:center; gap:0.75rem; font-size:0.82rem; }
  .salir-btn { background:rgba(255,255,255,0.12); border:none; color:white; padding:5px 12px; border-radius:6px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:0.82rem; }

  /* MAIN */
  main { padding:1.5rem; max-width:900px; margin:0 auto; }

  /* CARDS */
  .welcome-card {
    background:var(--ink2); color:white; border-radius:16px;
    padding:1.5rem 2rem; margin-bottom:1.5rem;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem;
  }
  .welcome-title { font-family:'DM Serif Display',serif; font-size:1.4rem; }
  .welcome-sub { font-size:0.82rem; opacity:0.7; margin-top:4px; }

  .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:1rem; margin-bottom:1.5rem; }
  .stat-card { background:white; border-radius:12px; padding:1.2rem 1.4rem; box-shadow:var(--shadow); border-left:3px solid var(--border); }
  .stat-card.accent { border-left-color:var(--accent); }
  .stat-card.green { border-left-color:var(--green); }
  .stat-card.gold { border-left-color:var(--gold); }
  .stat-card.purple { border-left-color:#9b59b6; }
  .stat-label { font-size:0.7rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#888; margin-bottom:6px; }
  .stat-val { font-family:'DM Serif Display',serif; font-size:1.6rem; color:var(--ink); line-height:1; }
  .stat-sub { font-size:0.72rem; color:#999; margin-top:4px; }

  /* CONTRATO CARD */
  .contrato-card {
    background:white; border-radius:14px; box-shadow:var(--shadow);
    margin-bottom:1.5rem; overflow:hidden;
  }
  .contrato-header {
    background:var(--ink); color:white; padding:1rem 1.4rem;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.5rem;
  }
  .contrato-titulo { font-family:'DM Serif Display',serif; font-size:1.1rem; }
  .contrato-body { padding:1.2rem 1.4rem; }
  .contrato-info { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:0.75rem; margin-bottom:1.2rem; }
  .info-item label { font-size:0.68rem; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:#999; display:block; margin-bottom:2px; }
  .info-item span { font-size:0.88rem; color:var(--ink); font-weight:500; }

  /* PAGOS TABLE */
  .section-title { font-family:'DM Serif Display',serif; font-size:1rem; margin-bottom:0.75rem; padding-bottom:0.5rem; border-bottom:1.5px solid var(--border); }
  .table-wrap { overflow-x:auto; border-radius:10px; border:1px solid var(--border); }
  table { width:100%; border-collapse:collapse; font-size:0.83rem; }
  thead { background:var(--ink); color:white; }
  th { padding:0.6rem 0.8rem; text-align:left; font-size:0.68rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase; white-space:nowrap; }
  th.r, td.r { text-align:right; white-space:nowrap; }
  tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:#faf7f2; }
  td { padding:0.6rem 0.8rem; vertical-align:middle; }
  tr.row-vencido td { background:#fff0f0; color:#721c24; }
  tr.row-pagado td { background:#f0fff4; }
  tr.row-futuro td { background:#f0f4ff; color:#555; }
  tr.row-parcial td { background:#fff8e1; }

  .badge { display:inline-block; padding:2px 8px; border-radius:100px; font-size:0.68rem; font-weight:600; }
  .badge-green { background:#d4edda; color:#155724; }
  .badge-red { background:#f8d7da; color:#721c24; }
  .badge-yellow { background:#fff3cd; color:#856404; }
  .badge-blue { background:#cce5ff; color:#004085; }
  .badge-gray { background:#e9ecef; color:#495057; }

  .saldo-pend { color:var(--accent); font-weight:700; }
  .saldo-ok { color:var(--green); font-weight:600; }

  /* ALERTA */
  .alerta-pend {
    background:#fff0f0; border:1.5px solid #f8d7da; border-radius:10px;
    padding:1rem 1.2rem; margin-bottom:1rem;
    display:flex; align-items:center; gap:0.75rem;
  }
  .alerta-pend .icon { font-size:1.4rem; }
  .alerta-pend p { font-size:0.85rem; color:#721c24; }
  .alerta-pend strong { font-size:1rem; }

  /* TOAST */
  .toast { position:fixed; bottom:2rem; right:2rem; background:var(--ink); color:white; padding:0.8rem 1.4rem; border-radius:8px; font-size:0.85rem; z-index:999; animation:toastIn 0.3s ease; box-shadow:var(--shadow-lg); }
  .toast.success { border-left:3px solid var(--green); }
  .toast.error { border-left:3px solid var(--accent); }
  @keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

  .loading { text-align:center; padding:3rem; color:#aaa; font-style:italic; }
  .empty { text-align:center; padding:2rem; color:#aaa; }

  @media(max-width:600px) { main { padding:1rem; } .welcome-card { padding:1rem; } }
</style>

<script>
// ============================================================
// CONFIG
// ============================================================
const SB_URL = 'https://hpufcseedvdmcoamundr.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwdWZjc2VlZHZkbWNvYW11bmRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMjU5NTQsImV4cCI6MjA5MzYwMTk1NH0.x91y_KKcuqM3CXCNTsMxTmJvi8HIm4SsxxNKUaX12d0';
const SB_AUTH = SB_URL + '/auth/v1';

function getArgentinaDate() {
  const now = new Date();
  const ar = new Date(now.toLocaleString('en-US', { timeZone: 'America/Argentina/Buenos_Aires' }));
  return ar.toISOString().split('T')[0];
}
const TODAY = getArgentinaDate();

let currentUser = null;
let userToken = SB_KEY;

function getHeaders(token) {
  return {
    'apikey': SB_KEY,
    'Authorization': `Bearer ${token || userToken}`,
    'Content-Type': 'application/json'
  };
}

async function sbGet(table, params='', token) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {
    headers: { ...getHeaders(token), 'Range': '0-9999' }
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ============================================================
// AUTH
// ============================================================
async function refreshToken() {
  const refreshTk = localStorage.getItem('inq_refresh_token');
  if (!refreshTk) return false;
  try {
    const r = await fetch(`${SB_AUTH}/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: refreshTk })
    });
    if (!r.ok) return false;
    const data = await r.json();
    userToken = data.access_token;
    currentUser.token = data.access_token;
    localStorage.setItem('inq_token', data.access_token);
    if (data.refresh_token) localStorage.setItem('inq_refresh_token', data.refresh_token);
    return true;
  } catch(e) { return false; }
}

async function sbGetWithRefresh(table, params='') {
  try {
    return await sbGet(table, params);
  } catch(e) {
    // Try refreshing token on JWT expired error
    if (e.message.includes('JWT') || e.message.includes('expired')) {
      const ok = await refreshToken();
      if (ok) return await sbGet(table, params);
      doLogout();
    }
    throw e;
  }
}

async function checkSession() {
  const hash = window.location.hash;

  // Handle error redirects
  if (hash.includes('error=') || hash.includes('error_code=')) {
    window.history.replaceState({}, document.title, window.location.pathname);
    showLogin();
    setTimeout(() => {
      const msg = document.getElementById('login-msg');
      if (msg) { msg.textContent = 'El link expiró o es inválido. Solicitá uno nuevo.'; msg.className = 'login-msg error'; }
    }, 100);
    return;
  }

  // Handle password recovery link
  if (hash.includes('type=recovery') || hash.includes('type=invite')) {
    const params = new URLSearchParams(hash.replace('#',''));
    const accessToken = params.get('access_token');
    if (accessToken) {
      window.history.replaceState({}, document.title, window.location.pathname);
      mostrarFormularioNuevaContrasena(accessToken);
      return;
    }
  }

  const token = localStorage.getItem('inq_token');
  const email = localStorage.getItem('inq_email');
  if (!token || !email) { showLogin(); return; }
  userToken = token;
  currentUser = { token, email };
  // Try to refresh token proactively
  await refreshToken();
  await cargarApp();
}

async function verBoletaInq(pagoId) {
  // Query pagos_pdf table for this pago
  let pdfs = [];
  try {
    const resp = await fetch(`${SB_URL}/rest/v1/pagos_pdf?pago_id=eq.${pagoId}&order=servicio.asc`,
      { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } });
    pdfs = await resp.json();
  } catch(e) {}

  if (!pdfs.length) { alert('No hay boleta disponible para este período.'); return; }

  // If multiple services, show selector
  let pdfRec = pdfs[0];
  if (pdfs.length > 1) {
    const labels = { epe: '⚡ EPE', agua: '💧 Agua', tgiu: '🏛️ TGIU', seguro: '🔒 Seguro', internet: '🌐 Internet', expensas: '🏢 Expensas' };
    await new Promise(resolve => {
      const div = document.createElement('div');
      div.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:9999';
      const btns = pdfs.map(r => `<button data-srv="${r.servicio}" style="display:block;width:100%;padding:12px 16px;margin:6px 0;border:1px solid #ddd;border-radius:8px;cursor:pointer;font-size:1rem;background:white">${labels[r.servicio]||r.servicio.toUpperCase()}</button>`).join('');
      div.innerHTML = `<div style="background:white;border-radius:12px;padding:1.5rem;text-align:center;min-width:220px;max-width:90vw"><div style="font-weight:700;margin-bottom:1rem;font-size:1rem">¿Qué boleta querés ver?</div>${btns}<button id="boleta-cancelar" style="margin-top:8px;padding:8px 20px;border:none;background:#eee;border-radius:8px;cursor:pointer;font-size:0.9rem">Cancelar</button></div>`;
      div.querySelectorAll('[data-srv]').forEach(btn => {
        btn.onclick = () => {
          pdfRec = pdfs.find(p => p.servicio === btn.dataset.srv) || pdfs[0];
          div.remove();
          resolve();
        };
      });
      div.querySelector('#boleta-cancelar').onclick = () => { div.remove(); resolve(null); };
      div.onclick = e => { if (e.target === div) { div.remove(); resolve(null); } };
      document.body.appendChild(div);
    });
    if (!pdfRec) return; // cancelled
  }

  try {
    // Get signed URL
    const resp = await fetch(`${SB_URL}/storage/v1/object/sign/servicios/${pdfRec.pdf_path}`,
      { method: 'POST', headers: { 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ expiresIn: 3600 }) });
    const data = await resp.json();
    const signedUrl = data.signedURL ? `${SB_URL}/storage/v1${data.signedURL}` : null;
    if (!signedUrl) throw new Error('No se pudo obtener URL');

    // Show modal with PDF page
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:1rem;overflow-y:auto';
    modal.innerHTML = `
      <div style="background:white;border-radius:12px;width:100%;max-width:700px;overflow-y:auto;max-height:90vh">
        <div style="background:#1a1a2e;color:white;padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center">
          <span style="font-weight:700">📄 Boleta</span>
          <button onclick="this.closest('[style*=fixed]').remove()" style="background:none;border:none;color:white;font-size:1.2rem;cursor:pointer">✕</button>
        </div>
        <div id="boleta-canvas-wrap" style="padding:1rem;text-align:center;color:#888">⏳ Cargando...</div>
        <div style="padding:1rem;text-align:center">
          <a href="${signedUrl}" download style="background:#e63946;color:white;padding:8px 20px;border-radius:8px;text-decoration:none;font-size:0.88rem">⬇ Descargar</a>
        </div>
      </div>`;
    document.body.appendChild(modal);

    // Render page
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    const pdfDoc = await pdfjsLib.getDocument(signedUrl).promise;
    const page = await pdfDoc.getPage(pdfRec.pdf_pagina);
    const wrap = document.getElementById('boleta-canvas-wrap');
    await new Promise(r => setTimeout(r, 150));
    const containerWidth = Math.min(window.innerWidth - 80, 650);
    const dpr = window.devicePixelRatio || 1;
    const baseViewport = page.getViewport({ scale: 1 });
    const scale = containerWidth / baseViewport.width;
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width * dpr;
    canvas.height = viewport.height * dpr;
    canvas.style.cssText = 'width:100%;height:auto;display:block';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    await page.render({ canvasContext: ctx, viewport }).promise;
    if (wrap) { wrap.innerHTML = ''; wrap.appendChild(canvas); }
    // Update download link to single page image
    try {
      const dlCanvas = document.createElement('canvas');
      const dlViewport = page.getViewport({ scale: 2 });
      dlCanvas.width = dlViewport.width;
      dlCanvas.height = dlViewport.height;
      await page.render({ canvasContext: dlCanvas.getContext('2d'), viewport: dlViewport }).promise;
      dlCanvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const dlLink = modal.querySelector('a[download]');
        if (dlLink) { dlLink.href = url; dlLink.download = 'boleta.png'; }
      }, 'image/png');
    } catch(e) {}
  } catch(e) {
    alert('Error al cargar la boleta: ' + e.message);
  }
}

setInterval(async () => {
  if (!currentUser?.email || !currentUser?.token) return;
  try {
    const r = await fetch(`${SB_URL}/rest/v1/usuarios?email=eq.${encodeURIComponent(currentUser.email)}&select=aprobado`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${currentUser.token}` }
    });
    const us = await r.json();
    if (r.ok && Array.isArray(us) && us.length > 0 && !us[0].aprobado) {

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!email || !pass) { showMsg('login','Completá email y contraseña','error'); return; }
  try {
    const r = await fetch(`${SB_AUTH}/token?grant_type=password`, {
      method:'POST',
      headers:{ 'apikey':SB_KEY, 'Content-Type':'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error_description || 'Error al ingresar');

    userToken = data.access_token;
    currentUser = { token: data.access_token, email: data.user.email };
    localStorage.setItem('inq_token', data.access_token);
    localStorage.setItem('inq_email', data.user.email);
    if (data.refresh_token) localStorage.setItem('inq_refresh_token', data.refresh_token);

    // Verify user is approved
    const usuarios = await sbGetWithRefresh('usuarios', `email=eq.${encodeURIComponent(email)}&select=*`, data.access_token);
    if (!usuarios.length || !usuarios[0].aprobado) {
      showMsg('login', 'Tu cuenta está pendiente de aprobación por la inmobiliaria.', 'warn');
      return;
    }
    // Check it's an inquilino (not admin trying to log into wrong portal)
    if (usuarios[0].rol === 'admin') {
      showMsg('login', 'Esta sección es para inquilinos. Los administradores ingresan por el sistema de gestión.', 'warn');
      return;
    }

    // If logging in with temp password, force password change
    if (usuarios[0].temp_password && pass === usuarios[0].temp_password) {
      mostrarFormularioCambioContrasena(data.access_token, usuarios[0].id);
      return;
    }

    await cargarApp();
  } catch(e) {
    showMsg('login', 'Email o contraseña incorrectos', 'error');
  }
}

async function confirmarCambioContrasena(token, usuarioId) {
  const nueva = document.getElementById('nueva-pass').value;
  const confirmar = document.getElementById('confirmar-pass').value;
  const msg = document.getElementById('cambio-pass-msg');
  if (nueva.length < 6) { msg.textContent = 'La contraseña debe tener al menos 6 caracteres'; msg.style.color = 'var(--accent)'; msg.style.display = 'block'; return; }
  if (nueva !== confirmar) { msg.textContent = 'Las contraseñas no coinciden'; msg.style.color = 'var(--accent)'; msg.style.display = 'block'; return; }
  try {
    // Update password in Supabase Auth
    const r = await fetch(`${SB_URL}/auth/v1/user`, {
      method: 'PUT',
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: nueva })
    });
    if (!r.ok) { const d = await r.json(); throw new Error(d.message || 'Error al cambiar contraseña'); }
    // Clear temp_password from usuarios table
    await fetch(`${SB_URL}/rest/v1/usuarios?id=eq.${usuarioId}`, {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ temp_password: null })
    });
    msg.textContent = '✓ Contraseña guardada. Ingresando...';
    msg.style.color = 'var(--green)';
    msg.style.display = 'block';
    setTimeout(() => cargarApp(), 1000);
  } catch(e) { msg.textContent = 'Error: ' + e.message; msg.style.color = 'var(--accent)'; msg.style.display = 'block'; }
}

      body: JSON.stringify({ email, password: pass })
    });

async function cargarApp() {
  hideLogin();
  document.getElementById('app-content').style.display = 'block';
  document.getElementById('btn-whatsapp-flotante').style.display = 'flex';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';

  try {
    // Get user info
    const usuarios = await sbGetWithRefresh('usuarios', `email=eq.${encodeURIComponent(currentUser.email)}&select=*`);
    const usuario = usuarios[0];
    document.getElementById('user-name').textContent = usuario?.nombre || currentUser.email;

    if (!usuario?.persona_id) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      document.getElementById('content').innerHTML = `
        <div style="text-align:center;padding:3rem">
          <div style="font-size:2rem;margin-bottom:1rem">🏠</div>
          <h2 style="font-family:'DM Serif Display',serif;margin-bottom:0.5rem">Tu cuenta está siendo configurada</h2>
          <p style="color:#888;font-size:0.9rem">La inmobiliaria está vinculando tu usuario con tu contrato. En breve podrás ver tus datos.</p>
        </div>
      `;
      return;
    }

    // Get contratos for this inquilino only
    if (!usuario.persona_id) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      document.getElementById('content').innerHTML = `
        <div style="text-align:center;padding:3rem">
          <div style="font-size:2rem;margin-bottom:1rem">🏠</div>
          <h2 style="font-family:'DM Serif Display',serif;margin-bottom:0.5rem">Tu cuenta está siendo configurada</h2>
          <p style="color:#888;font-size:0.9rem">La inmobiliaria está vinculando tu usuario con tu contrato. En breve podrás ver tus datos.</p>
        </div>
      `;
      return;
    }
    const contratos = await sbGetWithRefresh('contratos', `inquilino_id=eq.${usuario.persona_id}&select=*&order=vigencia_desde.desc`);

    if (!contratos.length) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      document.getElementById('content').innerHTML = `<div class="empty"><p>No encontramos contratos asociados a tu cuenta.</p></div>`;
      return;
    }

    // Get pagos only for this inquilino's contratos
    const hojas = contratos.map(c => c.hoja);
    let todosPagos = [];
    if (hojas.length > 0) {
      for (const hoja of hojas) {
        const pagos = await sbGet('pagos', `hoja=eq.${encodeURIComponent(hoja)}&order=mes.asc`);
        todosPagos = todosPagos.concat(pagos);
      }
    }

    // Get extras
    const pagoIds = todosPagos.map(p=>p.id).join(',');
    let extras = [];
    if (pagoIds) {
      extras = await sbGet('pagos_extras', `pago_id=in.(${pagoIds})&order=id.asc`);
    }
    const extrasMap = {};
    extras.forEach(e => {
      if (!extrasMap[e.pago_id]) extrasMap[e.pago_id] = [];
      extrasMap[e.pago_id].push(e);
    });

    // Load pagos_pdf for PDF buttons
    window._inqPagosPdf = {};
    if (pagoIds) {
      try {
        const pdfData = await sbGet('pagos_pdf', `pago_id=in.(${pagoIds})`);
        pdfData.forEach(r => {
          if (!window._inqPagosPdf[r.pago_id]) window._inqPagosPdf[r.pago_id] = [];
          window._inqPagosPdf[r.pago_id].push(r);
        });
      } catch(e) { console.error('Error loading pagos_pdf:', e); }
    }
    console.log('pagos_pdf loaded:', Object.keys(window._inqPagosPdf).length, 'pagos con PDF');

    renderApp(usuario, contratos, todosPagos, extrasMap);
  } catch(e) {
    document.getElementById('loading').innerHTML = `<p style="color:var(--accent)">Error al cargar datos: ${e.message}</p>`;
  }
}

function renderApp(usuario, contratos, todosPagos, extrasMap) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  // Global stats
  const pendientes = todosPagos.filter(p => p.saldo && p.saldo > 0 && p.mes && p.mes.substring(0,7) <= TODAY.substring(0,7));
  const totalDeuda = pendientes.reduce((s,p) => s+(p.saldo||0), 0);
  const contratoVigente = contratos.find(c => c.vigencia_hasta && c.vigencia_hasta >= TODAY);

  let html = `
    <div class="welcome-card">
      <div>
        <div class="welcome-title">Hola, ${(() => {
          const n = usuario.nombre || '';
          // Handle "APELLIDO, Nombre" format

          return n.split(' ')[0] || usuario.email.split('@')[0];
        })()} 👋</div>
        <div class="welcome-sub">Acá podés ver el estado de tu alquiler</div>
      </div>
      <div style="font-size:0.78rem;opacity:0.6">${new Date().toLocaleDateString('es-AR',{timeZone:'America/Argentina/Buenos_Aires',weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
    </div>

    <div class="stats-row">
      <div class="stat-card green">
        <div class="stat-label">Contratos</div>
        <div class="stat-val">${contratos.length}</div>
        <div class="stat-sub">${contratoVigente ? '✓ Vigente' : 'Sin contrato vigente'}</div>
      </div>
      <div class="stat-card ${totalDeuda > 0 ? 'accent' : 'green'}">
        <div class="stat-label">Saldo pendiente</div>
        <div class="stat-val" style="font-size:${totalDeuda>999999?'1.1rem':'1.6rem'}">${formatMoney(totalDeuda)}</div>
        <div class="stat-sub">${pendientes.length} cuota${pendientes.length!==1?'s':''} sin pagar</div>
      </div>
      <div class="stat-card gold">
        <div class="stat-label">Próximo vencimiento</div>
        <div class="stat-val" style="font-size:1rem">${proximoVencimientoMes(contratos, todosPagos)}</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-label">Vigencia hasta</div>
        <div class="stat-val" style="font-size:1rem">${vigenciaHasta(contratos)}</div>
      </div>
    </div>
  `;

  // Alert if has debt

                  return `<tr class="${rowClass}">

async function vincularPorDNI(usuarioId) {
  const dni = document.getElementById('dni-vinc')?.value.trim().replace(/\./g,'');
  if (!dni || dni.length < 6) {
    alert('Ingresá un DNI válido');
    return;
  }
  try {
    // Search persona by DNI
    const r = await fetch(`${SB_URL}/rest/v1/personas?dni=eq.${encodeURIComponent(dni)}&select=id,apellido,nombre&limit=5`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${userToken}` }
    });
    const personas = await r.json();
    if (!personas.length) {
      alert('No encontramos ninguna persona con ese DNI. Comunicate con la inmobiliaria.');
      return;
    }
    // Link user to persona
    const persona = personas[0];
    await fetch(`${SB_URL}/rest/v1/usuarios?id=eq.${usuarioId}`, {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${userToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ persona_id: persona.id })
    });
    toast(`✓ Cuenta vinculada con ${persona.apellido}, ${persona.nombre}`);
    // Reload app
    await cargarApp();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

function mostrarFormularioNuevaContrasena(accessToken) {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-content').style.display = 'none';
  
  // Hide tabs, show only password form
  document.querySelector('.login-tabs').style.display = 'none';
  document.getElementById('login-panel').style.display = 'none';
  document.getElementById('registro-panel').style.display = 'none';
  document.getElementById('forgot-panel').style.display = 'none';

  const card = document.querySelector('.login-card');
  const newPanel = document.createElement('div');
  newPanel.id = 'nueva-pass-panel';
  newPanel.className = 'login-form';
  newPanel.innerHTML = `
    <p style="font-size:0.88rem;color:#444;text-align:center;margin-bottom:1rem">Elegí tu nueva contraseña para acceder al portal.</p>
    <input type="password" id="nueva-pass" placeholder="Nueva contraseña (mínimo 6 caracteres)">
    <input type="password" id="nueva-pass-confirm" placeholder="Repetir contraseña">
    <button class="login-btn" onclick="guardarNuevaContrasena('${accessToken}')">Guardar contraseña</button>
    <div id="nueva-pass-msg"></div>
  `;
  card.appendChild(newPanel);
}

async function guardarNuevaContrasena(accessToken) {
  const pass = document.getElementById('nueva-pass').value;
  const confirm = document.getElementById('nueva-pass-confirm').value;
  const msg = document.getElementById('nueva-pass-msg');
  
  if (pass.length < 6) { msg.textContent = 'Mínimo 6 caracteres'; msg.className = 'login-msg error'; return; }
  if (pass !== confirm) { msg.textContent = 'Las contraseñas no coinciden'; msg.className = 'login-msg error'; return; }

  try {
    const r = await fetch(`${SB_URL}/auth/v1/user`, {
      method: 'PUT',
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pass })
    });
    if (!r.ok) throw new Error('Error al guardar');
    msg.textContent = '✓ Contraseña guardada. Iniciá sesión.'; 
    msg.className = 'login-msg success';
    // Show login after 2 seconds
    setTimeout(() => {
      document.getElementById('nueva-pass-panel')?.remove();
      document.querySelector('.login-tabs').style.display = 'flex';
      document.getElementById('login-panel').style.display = 'flex';
      document.querySelectorAll('.login-tab')[0].classList.add('active');
    }, 2000);
  } catch(e) {
    msg.textContent = 'Error al guardar la contraseña. Intentá de nuevo.';
    msg.className = 'login-msg error';
  }
}

function formatDate(d, showDay=false) {
  if (!d) return '—';
  const [y,m,day] = d.substring(0,10).split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return showDay ? `${parseInt(day)} ${months[parseInt(m)-1]} ${y}` : `${months[parseInt(m)-1]} ${y}`;
}

function formatMoney(n) {
  if (n == null || isNaN(n)) return '—';
  return '<span style="white-space:nowrap">$ ' + Math.round(n).toLocaleString('es-AR') + '</span>';
}

function normTipo(t) {
  if (!t || t==='nan') return 'Inmueble';
  const l = t.toLowerCase();
  if (l.includes('casa')||l.includes('vivienda')||l.includes('habitaci')) return 'Casa/Habitación';
  if (l.includes('dpto')||l.includes('departamento')) return 'Departamento';
  if (l.includes('local')||l.includes('comercial')) return 'Local Comercial';
  if (l.includes('galp')||l.includes('depósito')) return 'Galpón/Depósito';
  return t;
}

function proximoVencimientoMes(contratos, todosPagos) {
  const hoy = TODAY.substring(0,10);
  const hoyDate = new Date(hoy + 'T12:00:00');
  let proximaFecha = null;

  contratos.filter(c => c.vigencia_hasta && c.vigencia_hasta >= TODAY).forEach(c => {
    const diaVenc = c.dia_vencimiento || 10;
    // Find next unpaid month from today onwards
    const pagosContrato = todosPagos
      .filter(p => p.hoja === c.hoja && p.mes && p.mes.substring(0,7) >= TODAY.substring(0,7))
      .sort((a,b) => a.mes.localeCompare(b.mes));
    for (const p of pagosContrato) {
      if ((!p.pagado || p.pagado === '0') && p.total > 0) {
        const mesKey = p.mes.substring(0,7);
        const fechaVenc = mesKey + '-' + String(diaVenc).padStart(2,'0');
        const fechaVencDate = new Date(fechaVenc + 'T12:00:00');
        // If due date already passed, move to next month
        let fechaFinal = fechaVenc;
        if (fechaVencDate < hoyDate) {
          const d = new Date(fechaVencDate);
          d.setMonth(d.getMonth() + 1);
          fechaFinal = d.toISOString().substring(0,10);
        }
        if (!proximaFecha || fechaFinal < proximaFecha) proximaFecha = fechaFinal;
        break;
      }
    }
  });

  if (!proximaFecha) return '—';
  const d1 = new Date(proximaFecha + 'T12:00:00');
  const dias = Math.round((d1 - hoyDate) / 86400000);
  return `${formatDate(proximaFecha, true)}${dias >= 0 ? ' ('+dias+' días)' : ''}`;
}

function vigenciaHasta(contratos) {
  const vigentes = contratos.filter(c => c.vigencia_hasta && c.vigencia_hasta >= TODAY);
  if (!vigentes.length) return '—';
  vigentes.sort((a,b) => b.vigencia_hasta.localeCompare(a.vigencia_hasta));
  const venc = vigentes[0].vigencia_hasta.substring(0,10);
  const d1 = new Date(venc + 'T12:00:00');
  const d2 = new Date(TODAY.substring(0,10) + 'T12:00:00');
  const meses = Math.round((d1 - d2) / (86400000 * 30));
  return `${formatDate(venc, true)}${meses > 0 ? ' ('+meses+' meses)' : ''}`;
}

function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
